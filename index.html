<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品 THÉ SAVOR — 台灣磨茶專賣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Serif+JP:wght@500;700&family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+KR:wght@400;500&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#132A1D;
  --forest:#1B3D28;
  --cream:#EFE9DC;
  --cream-warm:#E6DFCC;
  --line:rgba(19,42,29,.16);
  --ink:#1A231C;
  --light-ox:#B9C36B;
  --med-ox:#B5651D;
  --heavy-ox:#5B2E1D;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--cream);
  color:var(--ink);
  font-family:'Noto Sans TC','Noto Sans JP','Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}
button,input{font:inherit}
.display{font-family:'Noto Serif TC','Noto Serif JP','Noto Serif KR',serif}
.logotype{font-family:'Cormorant Garamond',serif}
.hero{padding:40px 24px 24px;text-align:center}
.hero-logo{display:flex;justify-content:center;align-items:center;margin-bottom:18px}
.hero-logo img{display:block;width:min(360px,78vw);height:auto;object-fit:contain}
.lang-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.lang-btn{
  border:1px solid var(--line);
  background:transparent;
  color:rgba(26,35,28,.58);
  padding:7px 15px;
  font-size:12.5px;
  letter-spacing:.06em;
  cursor:pointer;
  border-radius:999px;
  transition:.18s ease;
}
.lang-btn.active{background:var(--forest);border-color:var(--forest);color:var(--cream)}
.lang-btn:hover{border-color:var(--forest);color:var(--forest)}
.lang-btn.active:hover{color:var(--cream)}
.search-wrap{max-width:920px;margin:0 auto;padding:0 20px 6px}
.search-box{position:relative}
.search-box input{
  width:100%;
  border:1px solid var(--line);
  background:rgba(255,255,255,.26);
  color:var(--ink);
  border-radius:999px;
  padding:12px 44px 12px 17px;
  outline:none;
  transition:.18s ease;
  font-size:16px; /* 防止 iOS 點擊輸入框時自動放大畫面 */
}
.search-box input:focus{border-color:var(--forest);box-shadow:0 0 0 3px rgba(27,61,40,.08)}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);opacity:.56;pointer-events:none}
.tabs{
  max-width:920px;
  margin:18px auto 0;
  display:flex;
  gap:2px;
  overflow-x:auto;
  border-bottom:1px solid var(--line);
  padding:0 20px;
  scrollbar-width:thin;
}
.tab{
  display:flex;
  align-items:center;
  gap:7px;
  padding:14px 16px 12px;
  font-size:13.5px;
  font-weight:500;
  color:rgba(26,35,28,.48);
  background:none;
  border:none;
  cursor:pointer;
  white-space:nowrap;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.tab.active{color:var(--deep);border-bottom-color:var(--med-ox);font-weight:700}
.mobile-nav{background:var(--cream)}
main{max-width:920px;margin:0 auto;padding:30px 20px 70px}
.promo{background:var(--forest);color:var(--cream);padding:12px 18px;font-size:12.5px;line-height:1.7;margin-bottom:10px;border-radius:2px}
.promo+.promo{margin-top:-2px}
.promo-wrap{margin-bottom:24px}
.section-label{display:flex;align-items:baseline;gap:10px;margin:0 0 18px}
.section-label h2{font-size:20px;margin:0;color:var(--deep);font-weight:700}
.category-visual{
  width:100%;
  max-width:900px;
  margin:0 auto 30px;
  aspect-ratio:18/7;
  border-radius:10px;
  overflow:hidden;
  background:var(--cream-warm);
  border:1px solid var(--line);
  position:relative;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.category-visual img{width:100%;height:100%;object-fit:cover;display:none}
.category-visual .placeholder-ico{font-size:42px;opacity:.5}
.category-visual .upload-hint{
  position:absolute;inset:0;background:rgba(19,42,29,.68);color:var(--cream);
  font-size:12px;line-height:1.6;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;text-align:center;padding:20px;
}
.category-visual:hover .upload-hint{opacity:1}
.category-visual input[type=file]{display:none}

.catalog-layout{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  align-items:stretch;
}
.catalog-visual{
  min-width:0;
  position:relative;
  width:100%;
}
.catalog-visual .category-visual{
  width:600px;
  max-width:100%;
  height:auto;
  min-height:0;
  margin:0 auto;
  aspect-ratio:16/9;
  border-radius:0;
}
.catalog-visual .category-visual img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}
.catalog-content{
  min-width:0;
  display:flex;
  flex-direction:column;
}
.catalog-content .promo-wrap{
  margin:0 0 0;
}
.catalog-content .promo{
  border-radius:0;
  margin:0;
  padding:7px 14px;
  font-size:12.5px;
  line-height:1.55;
  background:#E6E8BC;
  color:var(--deep);
}
.catalog-content .promo + .promo{
  margin-top:0;
  border-top:1px solid rgba(19,42,29,.12);
}
.catalog-head{
  display:grid;
  grid-template-columns:minmax(220px,38%) 1fr;
  background:#877E70;
  color:#fff;
  min-height:32px;
  align-items:center;
}
.catalog-head-title,
.catalog-head-notes{
  padding:5px 14px;
  font-size:14px;
  letter-spacing:.06em;
  font-weight:500;
}
.catalog-head-notes{
  border-left:1px solid rgba(255,255,255,.35);
}
.catalog-head-notes .en{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;
  margin-left:5px;
  letter-spacing:.04em;
}
.catalog-items{
  flex:1;
}
.catalog-row{
  display:grid;
  grid-template-columns:minmax(220px,38%) 1fr;
  border-bottom:1px solid rgba(19,42,29,.15);
  min-height:88px;
}
.catalog-product{
  display:grid;
  grid-template-columns:12px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  padding:8px 12px 8px 0;
}
.catalog-swatch{
  width:12px;
  height:20px;
  align-self:start;
  margin-top:3px;
}
.catalog-name{
  min-width:0;
}
.catalog-name-primary{
  font-family:'Noto Serif TC','Noto Serif JP','Noto Serif KR',serif;
  font-size:16px;
  font-weight:700;
  line-height:1.25;
  color:var(--ink);
}
.catalog-name-secondary{
  font-size:13px;
  line-height:1.2;
  color:rgba(26,35,28,.78);
  margin-top:2px;
}
.catalog-meta{
  font-size:10.5px;
  line-height:1.45;
  color:rgba(26,35,28,.56);
  margin-top:5px;
}
.catalog-price{
  min-width:76px;
  text-align:right;
  white-space:nowrap;
}
.catalog-price .price{
  display:block;
  font-size:27px;
  line-height:1;
  color:#111;
}
.catalog-price-label{
  font-size:10.5px;
  margin-top:4px;
  color:var(--ink);
}
.catalog-notes{
  border-left:1px solid rgba(19,42,29,.15);
  padding:9px 14px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.catalog-desc-primary{
  font-size:12.5px;
  line-height:1.55;
  color:var(--ink);
}
.catalog-desc-secondary{
  font-size:11.5px;
  line-height:1.4;
  color:rgba(26,35,28,.68);
  margin-top:3px;
}

.product-list{
  margin-top:8px;
}
.product-list-item{
  position:relative;
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;
  min-height:160px;
  padding:22px 18px 22px 22px;
  border-bottom:1px dashed rgba(19,42,29,.18);
  background:transparent;
}
.product-list-item:last-child{
  border-bottom:none;
}
.product-list-bar{
  position:absolute;
  left:0;
  top:22px;
  bottom:22px;
  width:4px;
  border-radius:2px;
}
.product-list-main{
  min-width:0;
}
.product-list-origin{
  font-size:10.5px;
  line-height:1.35;
  color:rgba(26,35,28,.45);
  margin-bottom:8px;
  letter-spacing:.02em;
}
.product-list-name{
  margin:0;
  font-family:'Noto Serif TC','Noto Serif JP','Noto Serif KR',serif;
  font-size:17px;
  font-weight:700;
  line-height:1.35;
  color:var(--ink);
}
.product-list-name .ih{
  font-size:11px;
  font-weight:400;
  color:rgba(26,35,28,.48);
  margin-left:8px;
}
.product-list-desc{
  margin:7px 0 0;
  font-size:12.5px;
  line-height:1.65;
  color:rgba(26,35,28,.66);
  max-width:700px;
}
.product-list-specs{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  margin-top:9px;
}
.product-list-spec{
  font-size:11px;
  color:rgba(26,35,28,.55);
}
.product-list-spec b{
  color:var(--deep);
  font-weight:700;
  margin-right:4px;
}
.product-list-flavor{
  display:inline-block;
  margin-top:9px;
  padding:2px 9px;
  border:1px solid var(--line);
  border-radius:999px;
  font-size:10.5px;
  color:var(--deep);
}
.product-list-price{
  align-self:start;
  text-align:right;
  white-space:nowrap;
  padding-top:2px;
}
.product-list-price .price{
  font-family:'Cormorant Garamond',serif;
  font-size:21px;
  font-weight:700;
  color:var(--deep);
}
.product-list-price .label{
  margin-top:3px;
  font-size:10px;
  color:rgba(26,35,28,.48);
}
.product-list-addon{
  margin-top:4px;
  font-size:10px;
  color:var(--med-ox);
  font-weight:700;
}

.catalog-addon{
  font-size:10px;
  color:var(--med-ox);
  margin-top:4px;
  font-weight:700;
}

.search-section{margin-top:30px}
.search-section:first-child{margin-top:0}
.item{border-bottom:1px dashed var(--line);padding:20px 0;display:flex;gap:12px;align-items:flex-start}
.item:first-child{padding-top:0}
.item-img{
  width:140px;
  height:140px;
  border-radius:8px;
  flex:0 0 140px;
  background:var(--cream-warm);
  border:1px solid var(--line);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.item-img img{width:140px;height:140px;object-fit:cover;display:none}
.item-img .placeholder-ico{font-size:24px;opacity:.55}
.item-img .upload-hint{
  position:absolute;
  inset:0;
  background:rgba(19,42,29,.68);
  color:var(--cream);
  font-size:9px;
  line-height:1.45;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity .15s;
  text-align:center;
  padding:10px;
}
.item-img:hover .upload-hint{opacity:1}
.item-img input[type=file]{display:none}
.upload-tip{font-size:11.5px;color:rgba(26,35,28,.5);margin:-8px 0 20px;font-style:italic}
.ox-bar{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;margin-top:4px}
.item-main{flex:1;min-width:0}
.origin-line{font-size:10.5px;color:rgba(26,35,28,.5);margin-bottom:4px;letter-spacing:.02em}
.item-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.item-name{font-size:17px;font-weight:700;color:var(--ink);margin:0}
.item-name .ih{font-size:11px;font-weight:400;color:rgba(26,35,28,.55);margin-left:6px}
.price{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--deep);white-space:nowrap}
.price-pair{display:flex;gap:14px;flex-wrap:wrap}
.price-pair .pp{text-align:right}
.price-pair .pp .lbl{font-size:10px;color:rgba(26,35,28,.5);display:block}
.item-desc{font-size:12.5px;color:rgba(26,35,28,.67);margin:7px 0 0;line-height:1.7;max-width:560px}
.spec-row{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.spec{font-size:11px;color:rgba(26,35,28,.55)}
.spec b{color:var(--deep);font-weight:700}
.flavor-tag{display:inline-block;font-size:10.5px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--deep);margin-top:9px}
.addon-price{font-size:11px;font-family:'Noto Sans TC','Noto Sans JP','Noto Sans KR',sans-serif;color:var(--med-ox);font-weight:500;margin-top:2px}
.info-panel{background:var(--cream-warm);border:1px solid var(--line);border-radius:2px;padding:16px 20px;margin-top:26px}
.info-panel h3{font-size:13px;margin:0 0 10px;color:var(--deep);font-weight:700}
.info-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;padding:6px 0;border-bottom:1px dashed var(--line)}
.info-row:last-child{border-bottom:none}
.info-row .k{color:rgba(26,35,28,.55)}
.info-row .v{font-weight:700;color:var(--deep);text-align:right}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.legend-item{font-size:12px}
.legend-item .name{font-weight:700;color:var(--deep);margin-bottom:3px}
.legend-item .desc{color:rgba(26,35,28,.6);font-size:11.5px;line-height:1.5}
.empty-state{padding:54px 20px;text-align:center;color:rgba(26,35,28,.58);border:1px dashed var(--line);border-radius:8px}
.empty-state strong{display:block;color:var(--deep);margin-bottom:6px}
footer{background:var(--forest);color:var(--cream);text-align:center;padding:22px 24px;font-size:11.5px;letter-spacing:.08em}
@media (max-width:680px){
  .hero{padding:30px 18px 20px}
  .search-wrap,.tabs,main{padding-left:16px;padding-right:16px}
  main{padding-top:24px;padding-bottom:54px}
  .item{gap:12px}
  .item-img,.item-img img{width:120px;height:120px}
  .item-img{flex-basis:120px}
  .item-name{font-size:16px}
  .price{font-size:18px}
  /* 搜尋列＋分類頁籤 在手機上捲動時固定在頂部，方便切換 */
  .mobile-nav{
    position:sticky;
    top:0;
    z-index:50;
    padding-top:10px;
    box-shadow:0 4px 10px rgba(19,42,29,.06);
  }
  .mobile-nav .tabs{margin-top:10px}
  /* 加大可點擊區域，手指更好操作 */
  .lang-btn{padding:9px 16px;min-height:36px}
  .tab{padding:14px 14px;min-height:44px}
  .category-visual{max-height:52vw}
}
@media (max-width:100%){
  .hero-logo img{width:min(300px,82vw)}
  .category-visual{max-width:100%;margin-bottom:24px}
  .lang-btn{padding:6px 12px;font-size:12px}
  .tab{padding:12px 13px 10px;font-size:12.5px}
  .item{display:grid;grid-template-columns:92px 4px minmax(0,1fr);gap:10px}
  .item.no-ox{grid-template-columns:92px minmax(0,1fr)}
  .item-img,.item-img img{width:92px;height:92px}
  .item-img{flex-basis:92px;border-radius:6px}
  .ox-bar{grid-column:2;grid-row:1;min-height:92px}
  .item-main{grid-column:3;grid-row:1}
  .item.no-ox .item-main{grid-column:2}
  .item-top{flex-direction:column;align-items:flex-start;gap:5px}
  .price-pair{gap:16px}
  .price-pair .pp{text-align:left}
  .item-desc{font-size:12px;line-height:1.6}
  .spec-row{gap:8px 12px}
  .upload-tip{line-height:1.5}
}
@media (max-width:390px){
  .item{grid-template-columns:82px 4px minmax(0,1fr)}
  .item.no-ox{grid-template-columns:82px minmax(0,1fr)}
  .item-img,.item-img img{width:82px;height:82px}
  .ox-bar{min-height:82px}
  .item-name{font-size:15px}
}

@media (max-width:760px){
  .catalog-layout{
    grid-template-columns:1fr;
    gap:14px;
  }
.catalog-visual .category-visual{
  width:100%;
  max-width:920px;
  height:auto;
  margin:0 auto;
  aspect-ratio:16/9;
  border-radius:8px;
}
  .catalog-head{
    grid-template-columns:1fr;
  }
  .catalog-head-notes{
    display:none;
  }
  .catalog-row{
    grid-template-columns:1fr;
    min-height:0;
    padding:12px 0;
  }
  .catalog-product{
    grid-template-columns:10px minmax(0,1fr) auto;
    padding:0 4px 7px 0;
  }
  .catalog-notes{
    border-left:none;
    padding:0 14px 0 20px;
  }
}
@media (max-width:420px){
  .catalog-product{
    grid-template-columns:8px minmax(0,1fr) auto;
    gap:8px;
  }
  .catalog-swatch{
    width:8px;
  }
  .catalog-name-primary{
    font-size:15px;
  }
  .catalog-name-secondary{
    font-size:12px;
  }
  .catalog-price{
    min-width:64px;
  }
  .catalog-price .price{
    font-size:24px;
  }
}


@media (max-width:520px){
  .product-list-item{
    grid-template-columns:1fr;
    gap:8px;
    min-height:0;
    padding:18px 10px 18px 18px;
  }
  .product-list-bar{
    top:18px;
    bottom:18px;
  }
  .product-list-price{
    text-align:left;
    padding-top:0;
  }
  .product-list-specs{
    gap:8px 14px;
  }
}

</style>
</head>
<body>
<div class="hero">
  <div class="hero-logo">
    <img src="images/logo.png" alt="THÉ SAVOR Logo">
  </div>
  <div class="lang-bar">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">English</button>
    <button class="lang-btn" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="ko">한국어</button>
  </div>
</div>

<div class="mobile-nav">
  <div class="search-wrap">
    <div class="search-box">
      <input id="searchInput" type="search" autocomplete="off" aria-label="搜尋商品">
      <span class="search-icon">⌕</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
</div>
<main id="main"></main>
<footer id="footer"></footer>

<script>
const UI = {
  zh:{unitBag:"包",unitBox:"盒",ih:"冰／熱",origin:"茶葉產地",oxidation:"發酵度",roast:"焙度",craft:"焙煎工藝",bagPrice:"茶包",boxPrice:"原葉茶",dripPrice:"濾掛包",footer:"感受台灣茶最純粹的風味",uploadTip:"正式圖片請放入 images 資料夾；點擊圖片可先在本機測試預覽",searchPlaceholder:"搜尋茶品、口味或商品介紹…",searchResult:"搜尋結果",noResult:"找不到符合的商品",noResultHint:"請嘗試其他關鍵字"},

let currentLang = "zh";
let currentTab = CATS[0].id;
let searchQuery = "";

function t(value){return value?.[currentLang] ?? value?.zh ?? "";}
function normalize(value){return String(value || "").toLocaleLowerCase().trim();}

function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = "";
  CATS.forEach(cat=>{
    const button = document.createElement("button");
    button.className = "tab" + (cat.id === currentTab && !searchQuery ? " active" : "");
    button.innerHTML = `${cat.ico} ${t(cat.name)}`;
    button.addEventListener("click",()=>{
      currentTab = cat.id;
      searchQuery = "";
      document.getElementById("searchInput").value = "";
      render();
    });
    el.appendChild(button);
  });
}

function categoryVisual(cat){
  return `
    <div class="category-visual" data-cat-id="${cat.id}">
      <img alt="${t(cat.name)}" src="images/${cat.id}.jpg"
           onload="this.style.display='block';this.parentElement.querySelector('.placeholder-ico').style.display='none';"
           onerror="this.style.display='none';this.parentElement.querySelector('.placeholder-ico').style.display='flex';">
      <span class="placeholder-ico">${cat.ico}</span>
      <div class="upload-hint">${UI[currentLang].uploadTip}</div>
      <input type="file" accept="image/*">
    </div>`;
}

function renderPromos(cat){
  if(!cat.promos?.length) return "";
  return `<div class="promo-wrap">${cat.promos.map(p=>`<div class="promo">${t(p)}</div>`).join("")}</div>`;
}

function imgBlock(item, ico){
  return `
    <div class="item-img" data-id="${item.id}">
      <img alt="${t(item.name)}" src="images/${item.id}.jpg"
           onload="this.style.display='block';this.parentElement.querySelector('.placeholder-ico').style.display='none';"
           onerror="this.style.display='none';this.parentElement.querySelector('.placeholder-ico').style.display='flex';">
      <span class="placeholder-ico">${ico}</span>
      <div class="upload-hint">${UI[currentLang].uploadTip}</div>
      <input type="file" accept="image/*">
    </div>`;
}


const CATALOG_SWATCHES = [
  "#EACB63","#B7A982","#C6D65E","#6B4933",
  "#8C6D4F","#A5B66A","#C79562","#6E8C70"
];

function getSecondaryText(obj){
  if(!obj) return "";
  if(currentLang === "zh") return "";
  if(currentLang === "en") return obj.zh || "";
  return obj.en || obj.zh || "";
}

function getCatalogPrice(cat,item){
  const ui = UI[currentLang];

  if(cat.cardType === "teaProduct"){
    if(cat.priceMode === "drip"){
      return {
        value:item.drip,
        label:ui.dripPrice
      };
    }
    return {
      value:item.box,
      label:ui.boxPrice
    };
  }

  return {
    value:item.price,
    label:currentLang === "zh" ? "盒" :
          currentLang === "en" ? "Box" :
          currentLang === "ja" ? "箱(Box)" : "박스(Box)"
  };
}

function getCatalogMeta(cat,item){
  const ui = UI[currentLang];
  const parts = [];

  if(item.origin) parts.push(`${ui.origin}｜${t(item.origin)}`);
  if(item.ox) parts.push(`${ui.oxidation} ${item.ox}%${item.oxNote ? t(item.oxNote) : ""}`);
  if(item.roast) parts.push(`${ui.roast} ${t(item.roast)}`);
  if(item.craft) parts.push(`${ui.craft} ${t(item.craft)}`);
  if(item.flavor) parts.push(t(item.flavor));

  return parts.join(" · ");
}

function renderCatalogRow(cat,item,index){
  const price = getCatalogPrice(cat,item);
  const swatch = item.oxColor || CATALOG_SWATCHES[index % CATALOG_SWATCHES.length];
  const secondaryName = getSecondaryText(item.name);
  const secondaryDesc = getSecondaryText(item.desc);
  const meta = getCatalogMeta(cat,item);

  const addon = cat.id === "icecream"
    ? `<div class="catalog-addon">${
        currentLang === "zh" ? "加購價 NT$20" :
        currentLang === "en" ? "Add-on NT$20" :
        currentLang === "ja" ? "追加価格 NT$20" :
        "추가 구매가 NT$20"
      }</div>`
    : "";

  return `
    <div class="catalog-row">
      <div class="catalog-product">
        <span class="catalog-swatch" style="background:${swatch}"></span>

        <div class="catalog-name">
          <div class="catalog-name-primary">${t(item.name)}${item.ihTag ? ` <span class="ih">（${UI[currentLang].ih}）</span>` : ""}</div>
          ${secondaryName ? `<div class="catalog-name-secondary">${secondaryName}</div>` : ""}
          ${meta ? `<div class="catalog-meta">${meta}</div>` : ""}
        </div>

        <div class="catalog-price">
          ${price.value != null ? `<span class="price">$${price.value}</span>` : ""}
          ${price.label ? `<div class="catalog-price-label">${price.label}</div>` : ""}
          ${addon}
        </div>
      </div>

      <div class="catalog-notes">
        ${item.desc ? `<div class="catalog-desc-primary">${t(item.desc)}</div>` : ""}
        ${secondaryDesc ? `<div class="catalog-desc-secondary">${secondaryDesc}</div>` : ""}
      </div>
    </div>`;
}


function getListPrice(cat,item){
  const ui = UI[currentLang];

  if(cat.cardType === "teaProduct"){
    if(cat.priceMode === "drip"){
      return { value:item.drip, label:ui.dripPrice };
    }
    return { value:item.box, label:ui.boxPrice };
  }

  return {
    value:item.price,
    label:cat.id === "icecream" ? "" :
      (currentLang === "zh" ? "盒" :
       currentLang === "en" ? "Box" :
       currentLang === "ja" ? "箱" : "박스")
  };
}

function renderProductListItem(cat,item,index){
  const ui = UI[currentLang];
  const price = getListPrice(cat,item);
  const barColor = item.oxColor || CATALOG_SWATCHES[index % CATALOG_SWATCHES.length];

  const specs = [];
  if(item.ox){
    specs.push(`<span class="product-list-spec"><b>${ui.oxidation}</b>${item.ox}%${item.oxNote ? t(item.oxNote) : ""}</span>`);
  }
  if(item.roast){
    specs.push(`<span class="product-list-spec"><b>${ui.roast}</b>${t(item.roast)}</span>`);
  }
  if(item.craft){
    specs.push(`<span class="product-list-spec"><b>${ui.craft}</b>${t(item.craft)}</span>`);
  }

  const addon = cat.id === "icecream"
    ? `<div class="product-list-addon">${
        currentLang === "zh" ? "加購價 NT$20" :
        currentLang === "en" ? "Add-on NT$20" :
        currentLang === "ja" ? "追加価格 NT$20" :
        "추가 구매가 NT$20"
      }</div>`
    : "";

  return `
    <div class="product-list-item">
      <span class="product-list-bar" style="background:${barColor}"></span>

      <div class="product-list-main">
        ${item.origin ? `<div class="product-list-origin">${ui.origin}｜${t(item.origin)}</div>` : ""}
        <p class="product-list-name">
          ${t(item.name)}
          ${item.ihTag ? `<span class="ih">（${ui.ih}）</span>` : ""}
        </p>
        ${item.desc ? `<p class="product-list-desc">${t(item.desc)}</p>` : ""}
        ${specs.length ? `<div class="product-list-specs">${specs.join("")}</div>` : ""}
        ${item.flavor ? `<span class="product-list-flavor">${t(item.flavor)}</span>` : ""}
      </div>

      <div class="product-list-price">
        ${price.value != null ? `<div class="price">NT$${price.value}</div>` : ""}
        ${price.label ? `<div class="label">${price.label}</div>` : ""}
        ${addon}
      </div>
    </div>`;
}

function renderProductList(cat){
  return `
    <div class="product-list">
      ${cat.items.map((item,index)=>renderProductListItem(cat,item,index)).join("")}
    </div>`;
}

    <div class="catalog-layout">
      <div class="catalog-visual">
        ${categoryVisual(cat)}
      </div>

      <div class="catalog-content">
        ${renderPromos(cat)}
        <div class="catalog-head">
          <div class="catalog-head-title">${t(cat.name)}</div>
          <div class="catalog-head-notes">${notesTitle}</div>
        </div>
        <div class="catalog-items">
          ${cat.items.map((item,index)=>renderCatalogRow(cat,item,index)).join("")}
        </div>
      </div>
    </div>`;
}


function renderTeaProductCard(cat,item){
  const ui = UI[currentLang];
  const isDrip = cat.priceMode === "drip";
  const isBoxOnly = cat.priceMode === "box";
  return `
    <div class="item no-ox">
      <div class="item-main">
        <div class="item-top">
          <p class="item-name display">${t(item.name)}</p>
          <div class="price-pair">
            ${isDrip ? `
              <div class="pp"><span class="lbl">${ui.dripPrice}</span><span class="price">NT$${item.drip}</span></div>
            ` : isBoxOnly ? `
              <div class="pp"><span class="lbl">${ui.boxPrice}</span><span class="price">NT$${item.box}</span></div>
            ` : `
              <div class="pp"><span class="lbl">${ui.bagPrice}</span><span class="price">NT$${item.bag}</span></div>
              <div class="pp"><span class="lbl">${ui.boxPrice}</span><span class="price">NT$${item.box}</span></div>
            `}
          </div>
        </div>
        ${item.desc ? `<p class="item-desc">${t(item.desc)}</p>` : ""}
        ${item.flavor ? `<span class="flavor-tag">${t(item.flavor)}</span>` : ""}
      </div>
    </div>`;
}

function renderStandardCard(cat,item){
  const ui = UI[currentLang];
  const oxBar = item.ox ? `<div class="ox-bar" style="background:${item.oxColor}"></div>` : "";
  const specs = [];
  if(item.ox) specs.push(`<span class="spec"><b>${ui.oxidation}</b> ${item.ox}%${item.oxNote ? t(item.oxNote) : ""}</span>`);
  if(item.roast) specs.push(`<span class="spec"><b>${ui.roast}</b> ${t(item.roast)}</span>`);
  if(item.craft) specs.push(`<span class="spec"><b>${ui.craft}</b> ${t(item.craft)}</span>`);
  return `
    <div class="item ${item.ox ? "" : "no-ox"}">
      ${imgBlock(item,cat.ico)}
      ${oxBar}
      <div class="item-main">
        ${item.origin ? `<div class="origin-line">${ui.origin}｜${t(item.origin)}</div>` : ""}
        <div class="item-top">
          <p class="item-name display">${t(item.name)}${item.ihTag ? `<span class="ih">（${ui.ih}）</span>` : ""}</p>
          ${item.price ? `<div class="price">NT$${item.price}${cat.id === "icecream" ? `<div class="addon-price">${currentLang === "zh" ? "加購價 NT$20" : currentLang === "en" ? "Add-on Price NT$20" : currentLang === "ja" ? "追加価格 NT$20" : "추가 구매가 NT$20"}</div>` : ""}</div>` : ""}
        </div>
        ${item.desc ? `<p class="item-desc">${t(item.desc)}</p>` : ""}
        ${specs.length ? `<div class="spec-row">${specs.join("")}</div>` : ""}
      </div>
    </div>`;
}

function renderItem(cat,item){
  return cat.cardType === "teaProduct" ? renderTeaProductCard(cat,item) : renderStandardCard(cat,item);
}

function renderInfo(cat){
  if(!cat.info) return "";
  let html = `<div class="info-panel"><h3 class="display">${t(cat.info.title)}</h3>`;
  if(cat.info.rows){
    html += cat.info.rows.map(row=>`<div class="info-row"><span class="k">${t(row.k)}</span><span class="v">${t(row.v)}</span></div>`).join("");
  }
  if(cat.info.legend){
    html += `<div class="legend-grid">${cat.info.legend.map(item=>`<div class="legend-item"><div class="name">${t(item.name)}</div><div class="desc">${t(item.desc)}</div></div>`).join("")}</div>`;
  }
  html += `</div>`;
  return html;
}

function getSearchText(cat,item){
  const parts = [t(cat.name),t(item.name),t(item.desc),t(item.flavor),t(item.origin),t(item.roast),t(item.craft)];
  return normalize(parts.join(" "));
}

function getSearchGroups(){
  const query = normalize(searchQuery);
  if(!query) return [];
  return CATS.map(cat=>({cat,items:cat.items.filter(item=>getSearchText(cat,item).includes(query))})).filter(group=>group.items.length);
}

function wireCategoryVisualUploads(){
  document.querySelectorAll(".category-visual[data-cat-id]").forEach(box=>{
    const id = box.dataset.catId;
    const input = box.querySelector('input[type="file"]');
    const image = box.querySelector("img");
    const placeholder = box.querySelector(".placeholder-ico");
    let saved = null;
    try{saved = localStorage.getItem("thesavor-category-img:"+id);}catch(error){console.warn(error);}
    if(saved){
      image.src = saved;
      image.style.display = "block";
      placeholder.style.display = "none";
    }
    box.addEventListener("click",()=>input.click());
    input.addEventListener("click",event=>event.stopPropagation());
    input.addEventListener("change",event=>{
      const file = event.target.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.addEventListener("load",event=>{
        const dataUrl = event.target.result;
        image.src = dataUrl;
        image.style.display = "block";
        placeholder.style.display = "none";
        try{localStorage.setItem("thesavor-category-img:"+id,dataUrl);}
        catch(error){console.warn("圖片預覽已顯示，但瀏覽器儲存空間不足：",error);}
      });
      reader.readAsDataURL(file);
    });
  });
}

function wireImageUploads(){
  document.querySelectorAll(".item-img[data-id]").forEach(box=>{
    const id = box.dataset.id;
    const input = box.querySelector('input[type="file"]');
    const image = box.querySelector("img");
    const placeholder = box.querySelector(".placeholder-ico");
    let saved = null;
    try{saved = localStorage.getItem("thesavor-img:"+id);}catch(error){console.warn(error);}
    if(saved){
      image.src = saved;
      image.style.display = "block";
      placeholder.style.display = "none";
    }
    box.addEventListener("click",()=>input.click());
    input.addEventListener("click",event=>event.stopPropagation());
    input.addEventListener("change",event=>{
      const file = event.target.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.addEventListener("load",event=>{
        const dataUrl = event.target.result;
        image.src = dataUrl;
        image.style.display = "block";
        placeholder.style.display = "none";
        try{localStorage.setItem("thesavor-img:"+id,dataUrl);}catch(error){console.warn("圖片預覽已顯示，但瀏覽器儲存空間不足，重新整理後可能不會保留：",error);}
      });
      reader.readAsDataURL(file);
    });
  });
}

function renderSearchResults(){
  const groups = getSearchGroups();
  if(!groups.length){
    return `<div class="empty-state"><strong>${UI[currentLang].noResult}</strong>${UI[currentLang].noResultHint}</div>`;
  }
  return groups.map(({cat,items})=>`
    <section class="search-section">
      <div class="section-label"><h2 class="display">${cat.ico} ${t(cat.name)}</h2></div>
      <div class="items">${items.map(item=>renderItem(cat,item)).join("")}</div>
    </section>`).join("");
}

function render(){
  renderTabs();
  const main = document.getElementById("main");
  document.getElementById("searchInput").placeholder = UI[currentLang].searchPlaceholder;

  if(searchQuery){
    main.innerHTML = `
      <div class="section-label">
        <h2 class="display">${UI[currentLang].searchResult}</h2>
      </div>
      ${renderSearchResults()}`;
  }else{
    const cat = CATS.find(item=>item.id === currentTab) || CATS[0];
    main.innerHTML = `
      <p class="upload-tip">${UI[currentLang].uploadTip}</p>
      ${renderPromos(cat)}
      <div class="section-label"><h2 class="display">${t(cat.name)}</h2></div>
      ${categoryVisual(cat)}
      ${renderProductList(cat)}
      ${renderInfo(cat)}`;
  }

  document.getElementById("footer").textContent =
    "PURE TEA, PURE EXPERIENCE ｜ " + UI[currentLang].footer;

  wireCategoryVisualUploads();
  wireImageUploads();
}

document.querySelectorAll(".lang-btn").forEach(button=>{
  button.addEventListener("click",()=>{
    document.querySelectorAll(".lang-btn").forEach(item=>item.classList.remove("active"));
    button.classList.add("active");
    currentLang = button.dataset.lang;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input",event=>{
  searchQuery = event.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
